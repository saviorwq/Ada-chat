<Directory /var/www/html>
    AllowOverride All
    Require all granted
</Directory>

# Keep sensitive runtime data unreachable from the web.
<Directory /var/www/html/ai_data>
    Require all denied
</Directory>

<Directory /var/www/html/ssl>
    Require all denied
</Directory>

<Directory /var/www/html/php>
    Require all denied
</Directory>
